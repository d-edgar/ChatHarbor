<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A8FE3"/>
      <stop offset="100%" stop-color="#0B5394"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0D47A1" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Water waves at bottom -->
  <path d="M0 720 Q128 680 256 720 Q384 760 512 720 Q640 680 768 720 Q896 760 1024 720 L1024 1024 Q1024 1024 804 1024 L220 1024 Q0 1024 0 804 Z" fill="url(#waterGrad)"/>
  <path d="M0 760 Q128 730 256 760 Q384 790 512 760 Q640 730 768 760 Q896 790 1024 760 L1024 1024 Q1024 1024 804 1024 L220 1024 Q0 1024 0 804 Z" fill="rgba(255,255,255,0.08)"/>

  <!-- Sailboat (harbor theme) -->
  <g transform="translate(512, 420)">
    <!-- Mast -->
    <rect x="-4" y="-200" width="8" height="280" rx="4" fill="white" opacity="0.95"/>

    <!-- Main sail -->
    <path d="M4 -190 L4 40 L130 40 Z" fill="white" opacity="0.9"/>

    <!-- Jib sail -->
    <path d="M-4 -160 L-4 20 L-90 20 Z" fill="white" opacity="0.75"/>

    <!-- Hull -->
    <path d="M-140 80 L140 80 L110 130 Q0 145 -110 130 Z" fill="white" opacity="0.95" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  </g>

  <!-- Chat bubbles (three small ones near the sail) -->
  <g opacity="0.9">
    <!-- Bubble 1 -->
    <rect x="620" y="240" width="80" height="50" rx="18" fill="white" opacity="0.85"/>
    <circle cx="640" cy="265" r="5" fill="#1A8FE3"/>
    <circle cx="660" cy="265" r="5" fill="#1A8FE3"/>
    <circle cx="680" cy="265" r="5" fill="#1A8FE3"/>

    <!-- Bubble 2 -->
    <rect x="310" y="200" width="70" height="44" rx="16" fill="white" opacity="0.7"/>
    <circle cx="330" cy="222" r="4" fill="#1A8FE3"/>
    <circle cx="347" cy="222" r="4" fill="#1A8FE3"/>
    <circle cx="364" cy="222" r="4" fill="#1A8FE3"/>

    <!-- Bubble 3 (small) -->
    <rect x="680" y="340" width="55" height="36" rx="14" fill="white" opacity="0.6"/>
    <circle cx="696" cy="358" r="3.5" fill="#1A8FE3"/>
    <circle cx="710" cy="358" r="3.5" fill="#1A8FE3"/>
  </g>
</svg>
